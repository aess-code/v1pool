<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="eye-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="circle-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
  </defs>

  <!-- 眼形轮廓（细线，渐变描边，透明填充） -->
  <path
    d="M 10 50 Q 30 20 50 20 Q 70 20 90 50 Q 70 80 50 80 Q 30 80 10 50 Z"
    fill="none"
    stroke="url(#eye-grad)"
    stroke-width="3"
    stroke-linejoin="round"
  />

  <!-- 眼球圆形 -->
  <circle cx="50" cy="50" r="20" fill="url(#circle-grad)"/>

  <!-- 心电波形 -->
  <polyline
    points="30,50 36,50 39,42 42,58 45,46 48,54 51,50 70,50"
    fill="none"
    stroke="white"
    stroke-width="2.2"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
